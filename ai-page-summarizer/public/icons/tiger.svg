<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#FF8C00"/>

  <!-- Ear left -->
  <ellipse cx="32" cy="28" rx="16" ry="20" fill="#FF8C00"/>
  <ellipse cx="32" cy="30" rx="9" ry="12" fill="#FFB347"/>

  <!-- Ear right -->
  <ellipse cx="96" cy="28" rx="16" ry="20" fill="#FF8C00"/>
  <ellipse cx="96" cy="30" rx="9" ry="12" fill="#FFB347"/>

  <!-- Face base -->
  <ellipse cx="64" cy="68" rx="46" ry="44" fill="#FFB347"/>

  <!-- Forehead stripes -->
  <path d="M50 32 Q52 22 54 32" stroke="#CC5500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M64 28 Q64 17 64 28" stroke="#CC5500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M78 32 Q76 22 74 32" stroke="#CC5500" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Eye whites -->
  <ellipse cx="47" cy="58" rx="12" ry="10" fill="white"/>
  <ellipse cx="81" cy="58" rx="12" ry="10" fill="white"/>

  <!-- Iris -->
  <ellipse cx="47" cy="59" rx="8" ry="8" fill="#3A7D44"/>
  <ellipse cx="81" cy="59" rx="8" ry="8" fill="#3A7D44"/>

  <!-- Pupils -->
  <ellipse cx="47" cy="59" rx="4" ry="5" fill="#1a1a1a"/>
  <ellipse cx="81" cy="59" rx="4" ry="5" fill="#1a1a1a"/>

  <!-- Eye shine -->
  <circle cx="49" cy="56" r="2" fill="white"/>
  <circle cx="83" cy="56" r="2" fill="white"/>

  <!-- Nose -->
  <ellipse cx="64" cy="76" rx="7" ry="5" fill="#E85D04"/>

  <!-- Mouth -->
  <path d="M57 82 Q64 90 71 82" stroke="#CC5500" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="64" y1="81" x2="64" y2="90" stroke="#CC5500" stroke-width="2" stroke-linecap="round"/>

  <!-- Cheek patches white -->
  <ellipse cx="36" cy="78" rx="14" ry="10" fill="white" opacity="0.85"/>
  <ellipse cx="92" cy="78" rx="14" ry="10" fill="white" opacity="0.85"/>

  <!-- Whiskers left -->
  <line x1="22" y1="73" x2="48" y2="77" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="79" x2="48" y2="80" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="85" x2="48" y2="83" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers right -->
  <line x1="106" y1="73" x2="80" y2="77" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="79" x2="80" y2="80" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="106" y1="85" x2="80" y2="83" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cheek stripes left -->
  <path d="M26 65 Q30 68 28 74" stroke="#CC5500" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M22 72 Q27 73 24 79" stroke="#CC5500" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheek stripes right -->
  <path d="M102 65 Q98 68 100 74" stroke="#CC5500" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M106 72 Q101 73 104 79" stroke="#CC5500" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
