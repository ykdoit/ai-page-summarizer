<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="128" height="64" rx="26" fill="url(#shine)"/>

  <!-- Document body -->
  <rect x="24" y="20" width="62" height="80" rx="7" fill="white" opacity="0.97"/>

  <!-- Folded corner -->
  <path d="M70 20 L86 36 L70 36 Z" fill="#e0e7ff"/>
  <path d="M70 20 L86 36 L70 36 Z" fill="white" opacity="0.5"/>

  <!-- Text lines – getting shorter (summarization metaphor) -->
  <rect x="33" y="46" width="42" height="5" rx="2.5" fill="#818cf8" opacity="0.55"/>
  <rect x="33" y="57" width="42" height="5" rx="2.5" fill="#818cf8" opacity="0.55"/>
  <rect x="33" y="68" width="30" height="5" rx="2.5" fill="#818cf8" opacity="0.55"/>
  <rect x="33" y="79" width="20" height="5" rx="2.5" fill="#818cf8" opacity="0.35"/>

  <!-- AI sparkle star (4-pointed) -->
  <g transform="translate(90 82)">
    <path d="M0-18 C1-6 6-1 18 0 C6 1 1 6 0 18 C-1 6-6 1-18 0 C-6-1-1-6 0-18Z" fill="#fbbf24"/>
  </g>
  <!-- Smaller secondary sparkle -->
  <g transform="translate(78 68)">
    <path d="M0-7 C0.4-2.3 2.3-0.4 7 0 C2.3 0.4 0.4 2.3 0 7 C-0.4 2.3-2.3 0.4-7 0 C-2.3-0.4-0.4-2.3 0-7Z" fill="white" opacity="0.85"/>
  </g>
</svg>
